services:
  spark-iceberg:
    image: tabulario/spark-iceberg
    container_name: spark-iceberg
    build: spark/
    depends_on:
      - rest
      - minio
    volumes:
      - ./files/spark/conf:/opt/spark/conf
      - ./files/spark/warehouse:/home/iceberg/warehouse
      - ./files/spark/notebooks:/home/iceberg/notebooks/notebooks
    env_file: "iceduck.env"
    ports:
      - 8888:8888
      - 8080:8080
      - 10000:10000
      - 10001:10001
    networks:
      iceberg_net:

  rest:
    image: apache/iceberg-rest-fixture
    container_name: rest
    ports:
      - 8181:8181
    env_file: "iceduck.env"
    environment:
      - CATALOG_WAREHOUSE=s3://warehouse
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
    networks:
      iceberg_net:
        aliases:
          - rest

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    env_file: "iceduck.env"
    volumes:
        - ./files/minio:/data
    ports:
      - 9001:9001
      - 9000:9000
    command: ["server", "/data", "--console-address", ":9001"]
    networks:
      iceberg_net:
        aliases:
          - warehouse.minio

  minio_init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: mc
    depends_on:
      - minio
    env_file: "iceduck.env"
    entrypoint: >
      /bin/bash -c "
      until ( mc alias set minio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} ) do echo '...waiting...' && sleep 1; done;
      mc ls minio/warehouse 2>&1 >/dev/null;
      if [[ $? -ne 0 ]] ; then
        mc mb minio/warehouse;
      fi;
      mc anonymous set public minio/warehouse;
      tail -f /dev/null
      "
    networks:
      iceberg_net:


  postgres:
    build:
      context: .
      dockerfile: ./docker/postgres/Dockerfile
    container_name: database
    ports: 
      - "5432:5432"
    env_file: "iceduck.env"
    volumes:
      - ./files/postgres/data:/var/lib/postgresql/data
      - ./docker/postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      iceberg_net:
        aliases:
          - database

networks:
  iceberg_net:

