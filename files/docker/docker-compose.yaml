services:

  trino-coordinator:
    image: 'trinodb/trino:latest'
    hostname: trino-coordinator
    container_name: iceduck_trino
    env_file: "../../etc/iceduck.env"
    ports:
      - ${TRINO_UI_PORT}:8080
    volumes:
      - ../data/trino/etc:/etc/trino
      - ../data/trino/data:/data
    networks:
      iceduck_net:
        aliases:
          - trino


  polaris:
    image: apache/polaris:latest
    container_name: iceduck_polaris
    ports:
      # API port
      - ${POLARIS_API_PORT}:8181
      # Management port (metrics and health checks)
      - ${POLARIS_MGMT_PORT}:8182
      - 8040:8080
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: "../../etc/iceduck.env"
    environment:
      - polaris.realm-context.realms=${POLARIS_REALM}
    healthcheck:
      test: ["CMD", "curl", "http://localhost:${POLARIS_MGMT_PORT}/q/health"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      iceduck_net:
        aliases:
          - rest

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: iceduck_minio
    env_file: "../../etc/iceduck.env"
    volumes:
        - ../data/minio:/data
    ports:
      - ${MINIO_UI_PORT}:9001
      - ${MINIO_API_PORT}:9000
    command: ["server", "/data", "--console-address", ":${MINIO_UI_PORT}"]
    healthcheck:
      test: ["CMD", "curl", "http://127.0.0.1:${MINIO_API_PORT}/minio/health/live"]
      interval: 1s
      timeout: 10s
    networks:
      iceduck_net:
        aliases:
          - warehouse.minio

  postgres:
    image: iceduck_postgres
    build:
      context: .
      dockerfile: ./postgres/Dockerfile
    container_name: iceduck_db
    ports: 
      - ${POSTGRES_PORT}:5432
    env_file: "../../etc/iceduck.env"
    volumes:
      - ../data/postgres/data:/var/lib/postgresql/data
      - ./postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      iceduck_net:
        aliases:
          - database

  shell:
    image: iceduck_shell
    build:
      context: .
      dockerfile: ./curlshell/Dockerfile

  spark:
    image: iceduck_spark
    build: ./spark
    container_name: iceduck_spark
    depends_on:
      - polaris
      - minio
    volumes:
      - ../data/spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ../data/spark/config/pyiceberg.yaml:/root/.pyiceberg.yaml
      - ../data/spark/warehouse:/home/iceberg/warehouse
      - ../scripts/jupyter:/home/iceberg/notebooks
    env_file: "../../etc/iceduck.env"
    ports:
      - ${SPARK_JUPYTER_PORT}:8888
      - ${SPARK_UI_PORT}:8080
      - 10000:10000
      - 10001:10001
    healthcheck:
      test: ["CMD", "curl", "http://localhost:${SPARK_UI_PORT}"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      iceduck_net:

networks:
  iceduck_net:
    name: iceduck_net
    external: true

